ServerName localhost
ServerTokens Prod
ServerSignature Off

<Directory "/var/www/html">
    Options FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html index.php
</Directory>

<Directory "/var/www/html/config">
    Require all denied
</Directory>

<Directory "/var/www/html/rag">
    Require all denied
</Directory>
