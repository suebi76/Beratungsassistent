<body class="bg-slate-100">

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;
        marked.setOptions({ breaks: true, gfm: true });

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                bot:        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>,

                settings:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
                message:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
                chevronRight: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>,
                book:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 18H20"/></svg>,
                layers:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.27a2 2 0 0 0 0 3.66l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09a2 2 0 0 0 0-3.66Z"/><path d="m2.1 11.74 9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09"/><path d="m2.1 16.05 9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09"/></svg>,
                wrench:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1-2.73-2.73z"/><path d="m10.3 10.3 1.6 1.6"/><path d="m11.1 14.5 1.6 1.6"/><path d="M3.1 3.1c-2.3 2.3-2.3 6 0 8.3l6.5 6.5c2.3 2.3 6 2.3 8.3 0"/><path d="M17.5 17.5l2.4 2.4"/></svg>,
                shield:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>,
                refresh:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
                info:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
                alert:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
                clipboard:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>,
                checkmark:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                fileDown:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>,
                zap:        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
                building:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>,
                toggle:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="12" x="2" y="6" rx="6" ry="6"/><circle cx="16" cy="12" r="2"/></svg>,
                toggleOff:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="12" x="2" y="6" rx="6" ry="6"/><circle cx="8" cy="12" r="2"/></svg>,
                plus:       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [config, setConfig] = useState(null);
            const [configError, setConfigError] = useState(null);
            const [loadingConfig, setLoadingConfig] = useState(true);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [isStreaming, setIsStreaming] = useState(false);
            const [currentView, setCurrentView] = useState("chat");
            const [copiedIndex, setCopiedIndex] = useState(null);
            const [error, setError] = useState(null);
            const [showPrivacy, setShowPrivacy] = useState(false);
            const [showDSB, setShowDSB] = useState(false);
            const [isSchifT, setIsSchifT] = useState(false);
            const scrollRef = useRef(null);
            const autoScroll = useRef(true);

            useEffect(() => {
                fetch("project.php")
                    .then((response) => {
                        if (!response.ok) throw new Error("Konfiguration konnte nicht geladen werden.");
                        return response.json();
                    })
                    .then((data) => setConfig(data))
                    .catch((err) => setConfigError(err.message || "Konfiguration konnte nicht geladen werden."))
                    .finally(() => setLoadingConfig(false));
            }, []);

            useEffect(() => {
                if (autoScroll.current && scrollRef.current) {
                    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                }
            }, [messages, isLoading]);

            const handleScroll = () => {
                const el = scrollRef.current;
                if (!el) return;
                autoScroll.current = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
            };

            const quickQuestions = config?.frontend?.quick_questions || [];
            const templates = config?.frontend?.templates || [];

            const clearChat = () => { setMessages([]); setInput(""); setError(null); autoScroll.current = true; };

            const downloadAsPdf = (text, filenameBase) => {
                try {
                    const { jsPDF } = window.jspdf;
                    if (!jsPDF || !text) return;
                    const doc = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
                    const ML = 20, MR = 20, MT = 28, MB = 22;
                    const PW = 210, PH = 297;
                    const CW = PW - ML - MR;
                    let y = MT;
                    const newPage = () => { doc.addPage(); y = MT; };
                    const checkY = (h) => { if (y + h > PH - MB) newPage(); };
                    const strip = (s) => s.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/`(.*?)`/g, '$1').replace(/~~(.*?)~~/g, '$1');
                    const writeLine = (content, size, style, rgb, indent = 0) => {
                        doc.setFontSize(size); doc.setFont('helvetica', style); doc.setTextColor(...rgb);
                        const wrapped = doc.splitTextToSize(content, CW - indent);
                        wrapped.forEach((l, i) => { checkY(size * 0.4); doc.text(l, ML + indent + (i > 0 ? 4 : 0), y); y += size * 0.38; });
                    };
                    doc.setFillColor(229, 0, 70);
                    doc.rect(0, 0, PW, 14, 'F');
                    doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(255, 255, 255);
                    doc.text((config?.title || 'Beratungsassistent') + '  \u00b7  Antwort', ML, 9.5);
                    const lines = text.split('\n');
                    let inCode = false;
                    lines.forEach((raw) => {
                        if (raw.startsWith('```')) { inCode = !inCode; y += 2; return; }
                        if (inCode) { writeLine(raw, 9, 'normal', [80, 80, 80], 4); return; }
                        const trimmed = raw.trim();
                        if (!trimmed) { y += 3; return; }
                        if (trimmed.startsWith('### ')) { y += 2; checkY(14); writeLine(strip(trimmed.slice(4)), 12, 'bold', [10, 25, 47]); y += 1; return; }
                        if (trimmed.startsWith('## ')) { y += 3; checkY(16); writeLine(strip(trimmed.slice(3)), 14, 'bold', [10, 25, 47]); y += 2; return; }
                        if (trimmed.startsWith('# ')) { y += 4; checkY(18); writeLine(strip(trimmed.slice(2)), 16, 'bold', [10, 25, 47]); y += 3; return; }
                        if (trimmed.startsWith('> ')) { doc.setDrawColor(229, 0, 70); doc.setLineWidth(0.8); checkY(8); doc.line(ML, y - 3, ML, y + 3); writeLine(strip(trimmed.slice(2)), 10, 'italic', [100, 116, 139], 4); return; }
                        if (/^[-*] /.test(trimmed)) { checkY(7); doc.setFontSize(11); doc.setFont('helvetica', 'normal'); doc.setTextColor(229, 0, 70); doc.text('\u2022', ML + 1, y); writeLine(strip(trimmed.slice(2)), 11, 'normal', [30, 30, 30], 6); return; }
                        const numMatch = trimmed.match(/^(\d+)\.\s+(.*)/);
                        if (numMatch) { checkY(7); doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.setTextColor(229, 0, 70); doc.text(numMatch[1] + '.', ML + 1, y); writeLine(strip(numMatch[2]), 11, 'normal', [30, 30, 30], 8); return; }
                        if (/^---+$/.test(trimmed)) { checkY(6); y += 2; doc.setDrawColor(226, 232, 240); doc.setLineWidth(0.3); doc.line(ML, y, PW - MR, y); y += 4; return; }
                        const hasBold = /\*\*/.test(trimmed);
                        writeLine(strip(trimmed), 11, hasBold ? 'bold' : 'normal', [30, 30, 30]); y += 1;
                    });
                    const total = doc.getNumberOfPages();
                    for (let p = 1; p <= total; p++) {
                        doc.setPage(p); doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(148, 163, 184);
                        doc.text((config?.title || 'Beratungsassistent') + '  \u00b7  RAG-gestuetzte Antwort', ML, PH - 8);
                        doc.text(p + ' / ' + total, PW - MR, PH - 8, { align: 'right' });
                    }
                    const safeName = String(filenameBase || "antwort").toLowerCase().replace(/[^a-z0-9äöüß]+/gi, "-").replace(/^-+|-+$/g, "") || "antwort";
                    doc.save(safeName + ".pdf");
                } catch (e) {}
            };

            const sendQuery = async (queryText) => {
                const trimmed = String(queryText || "").trim();
                if (!trimmed || isLoading || isStreaming || !config?.configured) return;
                autoScroll.current = true;
                setError(null);
                const history = messages.slice();
                setMessages([...history, { role: "user", text: trimmed }, { role: "assistant", text: "" }]);
                setInput(""); setIsLoading(true); setIsStreaming(true);
                try {
                    const response = await fetch("proxy.php", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ messages: history.map((entry) => ({ role: entry.role, text: entry.text })), query: trimmed }),
                    });
                    if (!response.ok || !response.body) throw new Error("Antwort vom Server fehlgeschlagen.");
                    const reader = response.body.getReader(); const decoder = new TextDecoder(); let buffer = ""; let fullText = "";
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split("\n");
                        buffer = lines.pop() || "";
                        for (const line of lines) {
                            if (!line.startsWith("data: ")) continue;
                            const payload = line.slice(6).trim();
                            if (!payload || payload === "[DONE]") continue;
                            try {
                                const data = JSON.parse(payload);
                                if (data.error) throw new Error(data.error);
                                const chunk = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                if (!chunk) continue;
                                fullText += chunk;
                                setMessages((current) => {
                                    const updated = current.slice();
                                    updated[updated.length - 1] = { role: "assistant", text: fullText };
                                    return updated;
                                });
                            } catch (e) {}
                        }
                    }
                    if (!fullText) {
                        setMessages((current) => current.slice(0, -1));
                        setError("Keine Antwort erhalten. Bitte erneut versuchen.");
                    }
                } catch (err) {
                    setMessages((current) => current.slice(0, -1));
                    setError("Verbindungsfehler: " + (err.message || "Bitte versuchen Sie es spaeter erneut."));
                } finally {
                    setIsLoading(false); setIsStreaming(false);
                }
            };

            const handleSendMessage = (e) => {
                e?.preventDefault();
                if (!input.trim() || isLoading || isStreaming) return;
                sendQuery(input);
            };

            const applyTemplate = (prompt) => {
                setInput(prompt);
                setCurrentView("chat");
            };

            const copyMessage = (text, idx) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedIndex(idx);
                    setTimeout(() => setCopiedIndex(null), 2000);
                }).catch(() => {});
            };

            /* ── Privacy Modal ──────────────────────────────────────────── */
            const PrivacyModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60" onClick={() => setShowPrivacy(false)}>
                    <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                        <div className="sticky top-0 bg-white rounded-t-3xl border-b border-slate-100 px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-[#e50046] p-2 rounded-xl text-white"><Icon name="shield" className="w-5 h-5" /></div>
                                <h2 className="font-bold text-[#0a192f] text-lg">Datenschutzhinweis</h2>
                            </div>
                            <button onClick={() => setShowPrivacy(false)} aria-label="Schliessen"
                                className="text-slate-400 hover:text-slate-700 text-xl font-bold w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all">{'\u2715'}</button>
                        </div>
                        <div className="px-6 py-5 space-y-5 text-sm text-slate-700">
                            <section>
                                <h3 className="font-bold text-[#0a192f] mb-1">Was macht diese App?</h3>
                                <p>Der <strong>{config?.title || "Beratungsassistent"}</strong> ist ein konfigurierbarer KI-Assistent mit dateibasierter Wissensbasis (RAG). Die KI-Antworten werden von <strong>Google Gemini</strong> auf Basis einer Wissensdatenbank generiert. Anfragen mit personenbezogenen Daten werden aktiv abgewiesen.</p>
                            </section>
                            <section>
                                <h3 className="font-bold text-[#0a192f] mb-1">Welche Daten werden verarbeitet?</h3>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>Die <strong>Texteingaben</strong>, die Sie in das Chat-Feld tippen</li>
                                    <li>Der <strong>Chatverlauf der laufenden Sitzung</strong> (wird als Kontext an die KI uebergeben)</li>
                                </ul>
                                <p className="mt-2 text-slate-500 text-xs bg-amber-50 border border-amber-200 rounded-xl p-3">
                                    <strong>Wichtig:</strong> Bitte geben Sie <strong>keine personenbezogenen Daten</strong> ein. Die KI ist angewiesen, solche Eingaben zu erkennen und abzulehnen.
                                </p>
                            </section>
                            <section>
                                <h3 className="font-bold text-[#0a192f] mb-1">Wohin gehen meine Eingaben?</h3>
                                <p>Ihre Texteingabe wird verschluesselt an den <strong>Webserver</strong> uebertragen. Dort nimmt <code>proxy.php</code> die Anfrage entgegen und leitet sie an die <strong>Google Gemini API</strong> weiter. Der API-Schluessel ist serverseitig gespeichert und per Zugriffsregel gesperrt.</p>
                                <p className="mt-1">Google LLC ist ein US-amerikanisches Unternehmen. Die Uebertragung erfolgt auf Grundlage der EU-Standardvertragsklauseln (Art. 46 DSGVO).</p>
                            </section>
                            <section>
                                <h3 className="font-bold text-[#0a192f] mb-1">Werden Daten gespeichert?</h3>
                                <p><strong>Nein.</strong> Weder der Webserver noch diese Anwendung speichern Ihre Eingaben dauerhaft. Der Verlauf existiert nur im Arbeitsspeicher Ihres Browsers. Es werden <strong>keine Cookies</strong> gesetzt und <strong>kein Tracking</strong> durchgefuehrt.</p>
                            </section>
                            <section>
                                <h3 className="font-bold text-[#0a192f] mb-1">Externe Verbindungen</h3>
                                <p>Alle Skripte sind lokal auf dem Server gespeichert. Beim Laden der Seite wird <strong>keine Verbindung zu externen Diensten</strong> hergestellt.</p>
                            </section>
                        </div>
                        <div className="px-6 pb-5">

                        </button>
                        <button onClick={() => setShowDSB(true)}
                            className="flex items-center gap-1.5 text-slate-400 hover:text-white transition-colors">
                            <Icon name="info" className="w-3 h-3 text-[#e50046]" /> DSB-Dokumentation
                        </button>
                    </footer>
                </div>

                {showPrivacy && <PrivacyModal />}
                {showDSB    && <DSBModal />}
                </React.Fragment>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
